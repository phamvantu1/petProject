spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin

    listener:
      simple:
        concurrency: 5
        max-concurrency: 10
        prefetch: 20
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 60000

  datasource:
    url: jdbc:postgresql://localhost:5432/petProject
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG

